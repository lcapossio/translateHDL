# translateHDL parity CI TEMPLATE. Copy to .github/workflows/parity.yml.
# OSS CAD Suite bundles iverilog, ghdl, ghdl-yosys-plugin, yosys, eqy and sby,
# so the WHOLE ladder (including Layer 2 formal SEC) runs here. --strict turns
# any skipped layer into a failure, so a missing tool can never weaken the proof.

name: parity

on:
  push:
  pull_request:

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML + pytest
        run: pip install pyyaml pytest

      - name: Install OSS CAD Suite (yosys, ghdl, eqy, sby, iverilog)
        uses: YosysHQ/setup-oss-cad-suite@v3

      - name: Harness self-tests
        run: pytest tests/ -v

      - name: Prove same-language fixture (strict)
        run: python scripts/parity.py tests/fixtures/counter/parity_good.yml --strict

      - name: Prove cross-language fixture (strict)
        run: python scripts/parity.py tests/fixtures/counter/parity_xlang.yml --strict

      - name: Broken fixture must FAIL (negative test)
        run: |
          if python scripts/parity.py tests/fixtures/counter/parity_bad.yml; then
            echo "ERROR: broken fixture unexpectedly passed parity"; exit 1
          else
            echo "OK: parity correctly rejected the broken translation"
          fi
